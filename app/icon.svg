<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fond navy -->
  <rect width="256" height="256" fill="#0D1F3C" rx="40"/>

  <!-- ── DRAPEAU DAMIER ── -->
  <!-- Mat -->
  <line x1="112" y1="68" x2="112" y2="112" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>

  <!-- Drapeau 4x4 cases -->
  <rect x="112" y="20" width="16" height="12" fill="#FFFFFF"/>
  <rect x="128" y="20" width="16" height="12" fill="#0D1F3C"/>
  <rect x="144" y="20" width="16" height="12" fill="#FFFFFF"/>
  <rect x="160" y="20" width="16" height="12" fill="#0D1F3C"/>

  <rect x="112" y="32" width="16" height="12" fill="#0D1F3C"/>
  <rect x="128" y="32" width="16" height="12" fill="#FFFFFF"/>
  <rect x="144" y="32" width="16" height="12" fill="#0D1F3C"/>
  <rect x="160" y="32" width="16" height="12" fill="#FFFFFF"/>

  <rect x="112" y="44" width="16" height="12" fill="#FFFFFF"/>
  <rect x="128" y="44" width="16" height="12" fill="#0D1F3C"/>
  <rect x="144" y="44" width="16" height="12" fill="#FFFFFF"/>
  <rect x="160" y="44" width="16" height="12" fill="#0D1F3C"/>

  <rect x="112" y="56" width="16" height="12" fill="#0D1F3C"/>
  <rect x="128" y="56" width="16" height="12" fill="#FFFFFF"/>
  <rect x="144" y="56" width="16" height="12" fill="#0D1F3C"/>
  <rect x="160" y="56" width="16" height="12" fill="#FFFFFF"/>

  <!-- Contour drapeau or -->
  <rect x="112" y="20" width="64" height="48" fill="none" stroke="#C9A84C" stroke-width="2.5" rx="1"/>

  <!-- ── PODIUM ── -->

  <!-- Marche 3 — gauche -->
  <rect x="28" y="152" width="66" height="72" rx="6" fill="#1E3F6E"/>
  <text x="61" y="196" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#8A96A8">3</text>

  <!-- Marche 1 — centre (or) -->
  <rect x="95" y="112" width="66" height="112" rx="6" fill="#C9A84C"/>
  <rect x="95" y="112" width="66" height="20" rx="6" fill="#E2C170" opacity="0.35"/>
  <text x="128" y="176" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#0D1F3C">1</text>

  <!-- Marche 2 — droite -->
  <rect x="162" y="132" width="66" height="92" rx="6" fill="#1E3F6E"/>
  <text x="195" y="186" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#8A96A8">2</text>

  <!-- Ligne d'arrivée pointillée -->
  <line x1="20" y1="232" x2="236" y2="232" stroke="#C9A84C" stroke-width="2" stroke-dasharray="10 6" opacity="0.5"/>
</svg>
